# charts/avatar-renderer/values.yaml

# Default values for avatar-renderer Helm chart.
# This file provides production-ready defaults for deploying
# the MPC‑ready VideoGenie Avatar Renderer Pod on a GPU‑enabled cluster.

# ------------------------------------------------------------------------------
# Image
# ------------------------------------------------------------------------------
image:
  repository: icr.io/videogenie/avatar-renderer
  tag: "latest"
  pullPolicy: IfNotPresent

# ------------------------------------------------------------------------------
# Replica settings
# ------------------------------------------------------------------------------
# Used only when autoscaling.enabled is false. With KEDA scale-to-zero you can
# set this and autoscaling.minReplicas to 0.
replicaCount: 1

# Container command/args. Defaults to serving the FastAPI REST API on 8080.
# Override to run the MCP STDIO server instead (see mcpServer below).
command: ["python", "-m", "uvicorn"]
args: ["app.api:app", "--host", "0.0.0.0", "--port", "8080"]

# Extra environment variables passed to the container.
env: []
  # - name: CELERY_BROKER_URL
  #   value: redis://redis:6379/0
  # - name: DEFAULT_ENHANCEMENTS
  #   value: emotion_expressions,eye_gaze_blink

# ------------------------------------------------------------------------------
# Service settings
# ------------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  annotations: {}

# ------------------------------------------------------------------------------
# Resource requests & limits
# ------------------------------------------------------------------------------
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2"
    memory: "4Gi"
    nvidia.com/gpu: 1

# ------------------------------------------------------------------------------
# Autoscaling (HPA fallback; use KEDA scaledobject for Kafka lag)
# ------------------------------------------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

# ------------------------------------------------------------------------------
# Health probes (FastAPI endpoints)
# ------------------------------------------------------------------------------
probes:
  enabled: true
  livenessPath: /health/live
  readinessPath: /health/ready

# ------------------------------------------------------------------------------
# Node scheduling
# ------------------------------------------------------------------------------
nodeSelector:
  role: gpu

tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "gpu"
    effect: "NoSchedule"

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app
              operator: In
              values:
                - avatar-renderer
        topologyKey: "kubernetes.io/hostname"

# ------------------------------------------------------------------------------
# MCP STDIO Server
# ------------------------------------------------------------------------------
mcpServer:
  enabled: true
  command:
    - "/app/.venv/bin/python"
  args:
    - "/app/mcp_server.py"
  env:
    - name: MCP_ENABLE
      value: "true"

# ------------------------------------------------------------------------------
# Extra pod annotations
# ------------------------------------------------------------------------------
podAnnotations: {}

# ------------------------------------------------------------------------------
# Extra pod labels
# ------------------------------------------------------------------------------
podLabels: {}

# ------------------------------------------------------------------------------
# Helm hooks (if any)
# ------------------------------------------------------------------------------
# hooks: {}

# ------------------------------------------------------------------------------
# Persistence (if you need to cache models locally in the pod)
# ------------------------------------------------------------------------------
persistence:
  enabled: false
  mountPath: /models
  accessMode: ReadOnlyMany
  size: 10Gi
